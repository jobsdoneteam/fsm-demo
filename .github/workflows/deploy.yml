name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            APP_DIR="/var/www/fsm-demo"
            REPO_URL="https://github.com/jobsdoneteam/fsm-demo.git"

            echo "Starting deployment..."

            if [ -d "$APP_DIR/.git" ]; then
              cd $APP_DIR
              # Preserve local config before reset
              cp .env /tmp/fsm-demo-env-backup 2>/dev/null || true
              cp ecosystem.config.js /tmp/fsm-demo-ecosystem-backup 2>/dev/null || true
              git remote set-url origin $REPO_URL
              git fetch origin main
              git reset --hard origin/main
              # Restore local config after reset
              cp /tmp/fsm-demo-env-backup .env 2>/dev/null || true
              cp /tmp/fsm-demo-ecosystem-backup ecosystem.config.js 2>/dev/null || true
            else
              echo "Initial clone..."
              git clone $REPO_URL $APP_DIR
              cd $APP_DIR
            fi

            echo "Installing dependencies..."
            npm install

            echo "Generating Prisma client..."
            npx prisma generate

            echo "Building Next.js..."
            npm run build

            echo "Restarting pm2..."
            pm2 restart fsm-demo

            echo "Deployed at $(date)"

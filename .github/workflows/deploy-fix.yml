name: Deploy Fix (temporary)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            APP_DIR="/var/www/fsm-demo"
            # Pull from dutchiono fork which has the auth fix
            REPO_URL="https://github.com/dutchiono/fsm-demo.git"

            echo "Starting deployment with auth fix..."

            cd $APP_DIR

            # Preserve local config before reset
            cp .env /tmp/fsm-demo-env-backup 2>/dev/null || true
            cp ecosystem.config.js /tmp/fsm-demo-ecosystem-backup 2>/dev/null || true

            # Add dutchiono remote and fetch
            git remote add dutchiono $REPO_URL 2>/dev/null || git remote set-url dutchiono $REPO_URL
            git fetch dutchiono main

            # Reset to dutchiono/main (has the auth basePath fix)
            git reset --hard dutchiono/main

            # Restore local config after reset
            cp /tmp/fsm-demo-env-backup .env 2>/dev/null || true
            cp /tmp/fsm-demo-ecosystem-backup ecosystem.config.js 2>/dev/null || true

            # Fix .env permissions
            sudo chown team:team .env 2>/dev/null || true

            # Ensure AUTH_URL and AUTH_SECRET are set (Auth.js v5 env vars)
            grep -q "^AUTH_URL" .env || echo 'AUTH_URL=https://jobsdone.team/fsm-demo/api/auth' >> .env
            grep -q "^AUTH_SECRET" .env || echo 'AUTH_SECRET=fsm_demo_secret_key_12345' >> .env

            # Show current .env keys
            echo "=== .env keys ==="
            cut -d= -f1 .env || true

            # Fix .next directory permissions
            sudo chown -R team:team $APP_DIR/.next 2>/dev/null || true

            echo "Installing dependencies..."
            npm install

            echo "Generating Prisma client..."
            npx prisma generate

            echo "Building Next.js..."
            npm run build

            echo "Restarting pm2..."
            pm2 delete fsm-demo 2>/dev/null || true
            pm2 start ecosystem.config.js

            # Wait for pm2 to settle and test auth endpoint
            sleep 3
            echo "=== Testing auth endpoint ==="
            curl -s -o /dev/null -w "csrf status: %{http_code}\n" http://127.0.0.1:3002/fsm-demo/api/auth/csrf || true
            curl -s -o /dev/null -w "providers status: %{http_code}\n" http://127.0.0.1:3002/fsm-demo/api/auth/providers || true

            echo "=== PM2 logs (last 20 lines) ==="
            pm2 logs fsm-demo --nostream --lines 20 || true

            echo "Deployed at $(date)"
